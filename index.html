<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Cover Page -->
    <div class="hero" id="cover">

        <p class="om">॥ श्री ॥</p>

        <h3>With the Blessings of Almighty</h3>

        <h2>Together With Their Families</h2>

        <h1>
            Bride Name
            <span class="heart">&</span>
            Groom Name
        </h1>

        <p class="invite">
            Request the honour of your gracious presence
            on the auspicious occasion of their wedding ceremony.
        </p>

        <div class="divider"></div>

        <button id="openBtn">
            Open Invitation
        </button>

    </div>

    <!-- Hidden Invitation -->
    <div class="invitation hidden" id="invitation">

        <h1>💍 Wedding Invitation 💍</h1>

        <p>
            Welcome to our wedding celebration.
        </p>

        <h2>Coming Soon...</h2>

    </div>

    <script src="script.js"></script>

</body>

</html>
